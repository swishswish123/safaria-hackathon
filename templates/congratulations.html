<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Great Job! – ScroLein</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .star { font-size: 80px; margin-bottom: 20px; animation: pop 0.5s ease; }

        @keyframes pop {
            0%   { transform: scale(0); }
            80%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 42px;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .assignment-name {
            font-size: 20px;
            color: #555;
            margin-bottom: 8px;
        }

        .message {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
            max-width: 400px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 16px;
            border-radius: 6px;
            text-decoration: none;
            margin: 8px;
        }
        .btn-primary { background-color: #2c3e50; color: white; }
        .btn-primary:hover { background-color: #1a252f; }
    </style>
</head>
<body>

    <div class="star">⭐</div>

    <h1>Kol HaKavod, {{ username }}!</h1>

    <p class="assignment-name">
        You submitted: <strong>{{ assignment.title }}</strong>
    </p>

    <p class="message">
        Your teacher will review your recording and give you feedback soon. Keep up the great work!
    </p>

    <a href="/dashboard" class="btn btn-primary">← Back to My Assignments</a>

</body>
</html>
