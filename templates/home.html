<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leining Review App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 60px;
            background-color: #f5f0e8;
        }
        h1 { color: #2c3e50; font-size: 36px; }
        p  { color: #555; font-size: 18px; }
        .btn {
            display: inline-block;
            margin: 12px;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary   { background-color: #2c3e50; color: white; }
        .btn-secondary { background-color: white; color: #2c3e50; border: 2px solid #2c3e50; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <!-- ScroLein logo bar -->
    <div style="text-align:center; padding: 24px 20px 0;">
        <a href="/"><img src="/static/scrolein_logo.png" alt="ScroLein" style="height:60px; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12));"></a>
    </div>

    <h1>🕍 Leining Review App</h1>
    <p>A space for students to submit Torah readings and receive feedback from their teacher.</p>
    <br>
    <a href="/register" class="btn btn-primary">Create Account</a>
    <a href="/login"    class="btn btn-secondary">Log In</a>
</body>
</html>
