<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account – ScroLein</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 30px; }
        p  { color: #777; margin-bottom: 40px; font-size: 15px; }

        .choice-row {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-card {
            background: white;
            border-radius: 12px;
            padding: 40px 36px;
            width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #2c3e50;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 2px solid transparent;
        }
        .choice-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-color: #2c3e50;
        }

        .choice-icon { font-size: 52px; margin-bottom: 16px; }
        .choice-card h2 { font-size: 20px; margin-bottom: 8px; }
        .choice-card p  { font-size: 13px; color: #999; margin: 0; }

        .back { margin-top: 32px; font-size: 14px; }
        .back a { color: #2c3e50; text-decoration: none; }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <!-- ScroLein logo bar -->
    <div style="text-align:center; padding: 24px 20px 0;">
        <a href="/"><img src="/static/scrolein_logo.png" alt="ScroLein" style="height:60px; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12));"></a>
    </div>

    <h1>Create an Account</h1>
    <p>Are you a student or a teacher?</p>

    <div class="choice-row">
        <a href="/register/student" class="choice-card">
            <div class="choice-icon">🎓</div>
            <h2>Student</h2>
            <p>Submit Torah readings and receive feedback.</p>
        </a>
        <a href="/register/teacher" class="choice-card">
            <div class="choice-icon">📖</div>
            <h2>Teacher</h2>
            <p>Assign readings and review student submissions.</p>
        </a>
    </div>

    <div class="back"><a href="/">Back to home</a></div>
</body>
</html>
