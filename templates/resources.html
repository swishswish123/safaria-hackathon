<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resources – Leining App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0e8;
            min-height: 100vh;
        }

        nav {
            background-color: #2c3e50;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { font-size: 20px; }

        .btn-back {
            padding: 8px 16px;
            background-color: #f39c12;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-back:hover { background-color: #d68910; }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 24px;
            text-align: center;
        }

        .icon   { font-size: 60px; margin-bottom: 16px; }
        h2      { font-size: 28px; color: #2c3e50; margin-bottom: 12px; }
        p       { color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <nav>
        <h1>🕍 Leining Review App</h1>
        <a href="/dashboard" class="btn-back">← Back to Dashboard</a>
    </nav>

    <div class="container">
        <div class="icon">📚</div>
        <h2>Resources</h2>
        <p>Your teacher's recordings and study materials will appear here soon.</p>
    </div>

</body>
</html>
