<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – ScroLein</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='student.css') }}"/>
</head>
<body class="auth-page">

  <div class="auth-logo"><img src="/static/scrolein_logo.png" alt="ScroLein"/></div>
  <p class="auth-tagline">Your personal Torah leining practice companion</p>

  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your ScroLein account</p>

    {% if error %}
    <div class="auth-error">
      <span class="auth-error-icon">⚠️</span>
      <div class="auth-error-msg"><strong>Couldn't sign in</strong>{{ error }}</div>
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <label class="auth-label">Username</label>
      <input class="auth-input {% if error_field in ['username','both'] %}error-field{% endif %}"
             type="text" name="username" autocomplete="username" autofocus/>

      <label class="auth-label">Password</label>
      <input class="auth-input {% if error_field in ['password','both'] %}error-field{% endif %}"
             type="password" name="password" autocomplete="current-password"/>

      <button type="submit" class="auth-btn">Sign In →</button>
    </form>

    <div class="auth-footer">
      New here? <a href="/register">Create an account</a>
    </div>
  </div>

</body>
</html>
