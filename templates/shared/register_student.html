<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration – ScroLein</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='student.css') }}"/>
</head>
<body class="auth-page">

  <div class="auth-logo"><img src="/static/scrolein_logo.png" alt="ScroLein"/></div>

  <div class="auth-card">
    <h2>Create Student Account</h2>
    <p class="sub">Choose a username your teacher will recognise</p>

    {% if error %}
    <div class="auth-error">
      <span class="auth-error-icon">⚠️</span>
      <div class="auth-error-msg"><strong>Registration error</strong>{{ error }}</div>
    </div>
    {% endif %}

    <form method="POST">
      <label class="auth-label">Username</label>
      <input class="auth-input" type="text" name="username" autocomplete="username" autofocus required/>

      <label class="auth-label">Password</label>
      <input class="auth-input" type="password" name="password" autocomplete="new-password" required/>

      <button type="submit" class="auth-btn">Create Account →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

</body>
</html>
