<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Notes – ScroLein</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='student.css') }}"/>
</head>
<body>

<nav>
  <ul class="nav-links">
    <a href="/dashboard" class="nav-back">← Dashboard</a>
  </ul>
  <div class="nav-brand">
    <img src="/static/scrolein_logo_white.png" alt="ScroLein" class="nav-logo"/>
  </div>
</nav>

<div class="page" style="max-width:600px;">
  <h2 style="font-family:'Frank Ruhl Libre',serif; color:var(--navy); margin-bottom:0.4rem;">Edit Notes</h2>
  <p style="color:var(--muted); font-size:0.9rem; margin-bottom:1.5rem; font-family:Arial,sans-serif;">{{ assignment.title }}</p>

  <form method="POST">
    <label style="display:block; font-family:Arial,sans-serif; font-size:13px; font-weight:bold; color:#3a2a10; margin-bottom:6px;">Your notes for this assignment</label>
    <textarea name="notes" rows="6"
      style="width:100%; padding:12px; font-size:15px; border:1.5px solid #ddd; border-radius:7px; font-family:Arial,sans-serif; resize:vertical;"
    >{{ assignment.notes or '' }}</textarea>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button type="submit" class="btn-sm green" style="font-size:14px; padding:10px 22px;">Save Notes</button>
      <a href="/dashboard" class="btn-sm" style="background:#eee; color:#555; font-size:14px; padding:10px 22px;">Cancel</a>
    </div>
  </form>
</div>

</body>
</html>
